- name                          : "Equatorial Tracker"
  position                      :
    latitude__deg               : 0.0
    longitude__deg              : -120.0
    altitude__m                 : 0.0
  performance                   :
    constraints                 :
      range_min_max__m          : 0.0, 2.0e6
      azimuth_min_max__deg      : -180.0, 90.0
      elevation_min_max__deg    : 0.0, 90.0
    uncertainty                 :
      range__m                  : 10.0
      range_rate__m_per_s       : 0.1
      azimuth__deg              : 0.01
      azimuth_rate__deg_per_s   : 0.001
      elevation__deg            : 0.01
      elevation_rate__deg_per_s : 0.001

- name                          : "Northern Tracker"
  position                      :
    latitude__deg               : 45.0
    longitude__deg              : 100.0
    altitude__m                 : 0.0
  performance                   :
    constraints                 :
      range_min_max__m          : 0.0, 2.5e6
      azimuth_min_max__deg      : -90.0, 90.0
      elevation_min_max__deg    : 5.0, 90.0
    uncertainty                 :
      range__m                  : 10.0
      range_rate__m_per_s       : 0.1
      azimuth__deg              : 0.01
      azimuth_rate__deg_per_s   : 0.001
      elevation__deg            : 0.01
      elevation_rate__deg_per_s : 0.001

- name                          : "Southern Tracker"
  position                      :
    latitude__deg               : -45.0
    longitude__deg              : 0.0
    altitude__m                 : 0.0
  performance                   :
    constraints                 :
      range_min_max__m          : 0.0, 3.0e6
      azimuth_min_max__deg      : -90.0, 90.0
      elevation_min_max__deg    : 5.0, 90.0
    uncertainty                 :
      range__m                  : 10.0
      range_rate__m_per_s       : 0.1
      azimuth__deg              : 0.01
      azimuth_rate__deg_per_s   : 0.001
      elevation__deg            : 0.01
      elevation_rate__deg_per_s : 0.001
