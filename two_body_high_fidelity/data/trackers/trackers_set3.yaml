- name                          : "Canberra DSN"
  position                      :
    latitude__deg               : -35.4
    longitude__deg              : 148.98
    altitude__m                 : 550.0
  performance                   :
    constraints                 :
      range_min_max__m          : 0.0, 2.5e6
      azimuth_min_max__deg      : -180.0, 180.0
      elevation_min_max__deg    : 10.0, 90.0
    uncertainty                 :
      range__m                  : 500.0
      range_rate__m_per_s       : 5.0
      azimuth__deg              : 0.5
      azimuth_rate__deg_per_s   : 0.05
      elevation__deg            : 0.5
      elevation_rate__deg_per_s : 0.05

