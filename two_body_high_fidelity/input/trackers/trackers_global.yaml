# Global Tracker Network - 6 stations distributed around Earth
# Approximately 60° longitude spacing for gaps between passes
# Mix of northern/southern latitudes for orbit plane coverage

- name                          : "Fairbanks"
  position                      :
    latitude__deg               : 64.8
    longitude__deg              : -147.7
    altitude__m                 : 140.0
  performance                   :
    constraints                 :
      range_min_max__m          :    0.0,  50000.0e3
      azimuth_min_max__deg      : -180.0,   180.0
      elevation_min_max__deg    :   10.0,    90.0
    uncertainty                 :
      range__m                  : 10.0
      range_rate__m_per_s       :  1.0
      azimuth__deg              :  0.1
      azimuth_rate__deg_per_s   :  0.01
      elevation__deg            :  0.1
      elevation_rate__deg_per_s :  0.01

