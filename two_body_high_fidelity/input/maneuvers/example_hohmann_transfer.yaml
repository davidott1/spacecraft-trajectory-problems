# Example: Hohmann Transfer Maneuvers
#
# This file demonstrates impulsive maneuvers for a simple Hohmann transfer.
# Two burns are performed:
#   1. Prograde burn at perigee to raise apogee
#   2. Prograde burn at new apogee to circularize
#
# Frame Options:
#   - J2000: Inertial frame (X, Y, Z components)
#   - RIC: Radial-In-track-Cross-track (orbit-aligned)
#   - RTN: Radial-Tangential-Normal (orbit-aligned)

maneuvers:
  # First burn: Raise apogee (prograde at perigee)
  - time_iso_utc: "2025-10-01T06:00:00"
    delta_vel__m_per_s: [0.0, 50.0, 0.0]  # 50 m/s in-track (prograde)
    frame: "RIC"

  # Second burn: Circularize at new apogee (prograde)
  - time_iso_utc: "2025-10-01T12:00:00"
    delta_vel__m_per_s: [0.0, 30.0, 0.0]  # 30 m/s in-track (prograde)
    frame: "RIC"
