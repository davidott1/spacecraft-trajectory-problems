# GPS BIIRM-5 (PRN 31) Propagation Configuration
#   NAVSTAR-48, NORAD ID 26407
#   GPS satellite at ~20,200 km altitude (MEO).
#   Negligible drag, SRP is primary non-gravitational perturbation.

# Initial state configuration
initial_state_source   : jpl_horizons
initial_state_norad_id : 26407  # GPS BIIRM-5 (PRN 31)

# Time span for propagation
timespan : 2024-01-15T00:00:00 2024-01-16T00:00:00

# Gravity model configuration
gravity_harmonics_degree_order : 4 4
gravity_harmonics_filename     : EGM2008.gfc

# Gravity third-bodies
third_bodies : Sun Moon Jupiter

# Perturbation forces (GPS has no drag at MEO altitude)
include_drag        : false
include_srp         : true
include_relativity  : true
include_solid_tides : true
include_ocean_tides : false

# Comparison options
compare_jpl_horizons : true
compare_tle          : false

# Visualization options
include_tracker_skyplots : true
tracker_filename         : trackers_gps_biirm_5.yaml
include_tracker_on_body  : true

# Orbit determination
include_orbit_determination : true
process_noise_pos : 1e-2
process_noise_vel : 1e-5

# Download options
auto_download : true
