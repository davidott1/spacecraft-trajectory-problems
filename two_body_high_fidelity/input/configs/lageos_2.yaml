# LAGEOS-2 Propagation Configuration
#   LAGEOS-2 is a passive geodetic satellite at ~5,900 km altitude (MEO).
#   Minimal drag/SRP due to small cross-section and high altitude.
#   Uses SLR (Satellite Laser Ranging) tracker stations.

# Initial state configuration
initial_state_source   : jpl_horizons
initial_state_norad_id : 22195  # LAGEOS-2

# Time span for propagation
timespan : 2024-01-15T00:00:00Z 2024-01-15T06:00:00Z

# Gravity model configuration
gravity_harmonics_degree_order : 8 8
# gravity_harmonics_coefficients : J2
gravity_harmonics_filename     : EGM2008.gfc

# Jacobian selection (exactly one should be true; defaults to approx if neither)
use_approx_jacobian   : false
use_analytic_jacobian : true
jacobian_approx_eps   : 1e-6  # Must be >= 1e-6 for numerical stability

# Gravity third-bodies (use 'third_bodies' to enable)
third_bodies : None

# Perturbation forces
include_drag        : false
include_srp         : false
include_relativity  : false
include_solid_tides : false
include_ocean_tides : false

# Comparison options
compare_jpl_horizons : true
compare_tle          : false

# Visualization options
include_tracker_skyplots : true
tracker_filename         : trackers_lageos_2.yaml
include_tracker_on_body  : true

# Orbit determination
include_orbit_determination : true
make_meas_from              : model
process_noise_pos           : 1e-6
process_noise_vel           : 1e-9

# Download options
auto_download : true