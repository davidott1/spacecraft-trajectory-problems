# ISS Propagation Configuration
#   International Space Station (ISS) at ~400 km altitude (LEO).
#   Significant drag due to low altitude and large surface area.
#   Significant SRP due to large solar arrays.

# Initial state configuration
initial_state_source: jpl_horizons
initial_state_norad_id: 25544  # ISS

# Time span for propagation
timespan: 2024-01-15T00:00:00 2024-01-15T12:00:00

# Gravity model configuration
gravity_harmonics_degree_order: 8 8
gravity_harmonics_filename: EGM2008.gfc

# Gravity third-bodies (use 'third_bodies' to enable)
third_bodies: Sun Moon Jupiter

# Perturbation forces (ISS is LEO, so drag is dominant)
include_drag: true
include_srp: true
include_relativity: true
include_solid_tides: true
include_ocean_tides: true

# Comparison options
compare_jpl_horizons: true
compare_tle: false

# Visualization options
include_tracker_skyplots: true
tracker_filename: trackers_lageos.yaml
include_tracker_on_body: true

# Orbit determination
include_orbit_determination: true

# Download options
auto_download: true
