# LAGEOS-2 Propagation Configuration
#   LAGEOS-2 is a passive geodetic satellite at ~5,900 km altitude (MEO).
#   Minimal drag/SRP due to small cross-section and high altitude.
#   Uses SLR (Satellite Laser Ranging) tracker stations.

# Initial state configuration
initial_state_source: jpl_horizons
initial_state_norad_id: 22195  # LAGEOS-2

# Time span for propagation
timespan: 2024-01-15T00:00:00 2024-01-15T12:00:00

# Gravity model configuration
# gravity_harmonics_coefficients: J2 J3 C21 S21 C22 S22 C31 S31 C32 S32 C33 S33
gravity_harmonics_degree_order: 20 20
gravity_harmonics_filename: EGM2008.gfc

# Gravity third-bodies
include_third_body_gravity: true
third_body_bodies: Sun Moon

# Perturbation forces (LAGEOS has minimal drag due to high altitude)
include_drag: false
include_srp: true
include_relativity: false
include_solid_tides: false
include_ocean_tides: true

# Comparison options
compare_jpl_horizons: true
compare_tle: false

# Visualization options
include_tracker_skyplots: true
tracker_filename: trackers_lageos.yaml
include_tracker_on_body: true

# Orbit determination
include_orbit_determination: false

# Download options
auto_download: true
