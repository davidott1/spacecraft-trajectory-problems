# Example: Maneuver Plan with Initial State and Variable Flags
#
# A maneuver plan defines the initial state (position, velocity, epoch)
# and a sequence of impulsive maneuvers. Each quantity can be marked as
# variable (optimizable) or fixed.
#
# When used with --optimize, only quantities marked variable: true
# will be adjusted by the optimizer. The same format is written to the
# output folder as the solved maneuver plan.
#
# Units:
#   - Position: meters [m]
#   - Velocity: meters per second [m/s]
#   - Delta-V:  meters per second [m/s]
#   - Time:     ISO 8601 UTC
#
# Frame Options:
#   - J2000: Inertial frame (X, Y, Z components)
#   - RIC:   Radial-In-track-Cross-track (orbit-aligned)
#   - RTN:   Radial-Tangential-Normal (orbit-aligned)

initial_state:
  name              : equatorial                                                               # name of the object
  frame             : J2000                                                                    # reference frame of the state vector
  epoch             : 2025-10-01T00:00:00Z                                                     # epoch of the state vector in ISO format
  coordinate_system : cartesian                                                                # coordinate system of the state vector
  pos_vec__m        : 7000.0e3, 0.0e0, 0.0e0                                                   # position vector [m]
  vel_vec__m_per_s  :    0.0e0, 7.5e3, 0.0e0                                                   # velocity vector [m/s]
  mass__kg          : 420000.0                                                                 # mass [kg]
  drag              :                                                                          # drag parameters
    coeff           : 2.2                                                                      # drag coefficient, typically c_d [-]
    area__m2        : 1000.0                                                                   # drag cross-sectional area [m²]
  srp               :                                                                          # solar radiation pressure parameters
    coeff           : 1.2                                                                      # solar radiation pressure coefficient, typically c_r [-]
    area__m2        : 1000.0                                                                   # srp cross-sectional area [m²]

maneuvers:
  - name: "burn1"
    description: "Raise apogee (prograde at perigee)"
    time_iso_utc: "2025-10-01T06:00:00"
    delta_vel_vec__m_per_s: 0.0, 50.0, 0.0
    frame: "RIC"
    variable_time:     false
    variable_delta_vel_vec:  true, true, true

  - name: "burn2"
    description: "Circularize at new apogee (prograde)"
    time_iso_utc: "2025-10-01T12:00:00"
    delta_vel_vec__m_per_s: 0.0, 30.0, 0.0
    frame: "RIC"
    variable_time:     false
    variable_delta_vel_vec:  true, true, true
